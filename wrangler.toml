# Cloudflare configuration for this Pages project.
#
# The D1 binding below is what makes `env.DB` available inside
# functions/api/apply.js. If you'd rather configure this through the
# dashboard instead (Workers & Pages > your project > Settings > Functions
# > D1 database bindings), you can delete this file — the dashboard binding
# achieves the same thing without needing wrangler.toml at all.
#
# To use this file: run `npx wrangler d1 create harmonies-sellers`, then
# paste the database_id it prints into database_id below.

name = "harmonies"
compatibility_date = "2026-07-11"
main = "src/worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "harmonies-sellers"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
